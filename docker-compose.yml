version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kanban-network
    restart: unless-stopped

  backend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./db.json:/app/db.json
      - ./package.json:/app/package.json
    command: sh -c "npm install -g json-server && json-server --watch db.json --port 3001 --host 0.0.0.0"
    ports:
      - "3001:3001"
    networks:
      - kanban-network
    restart: unless-stopped

networks:
  kanban-network:
    driver: bridge
